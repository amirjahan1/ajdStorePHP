services:
  postgres:
    image: postgres:15.18-trixie
    container_name: ajd_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # mongo:
  #   image: mongo:noble
  #   container_name: ajd_mongo
  #   restart: unless-stopped
  #   environment:
  #     - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
  #     - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
  #     - MONGO_INITDB_ROOT_DB=${MONGO_INITDB_ROOT_DB}
  #   ports:
  #     - "${MONGO_INITDB_ROOT_PORT}:27017"
  #   volumes:
  #     - ./db/mongo_data:/data/db
  #   networks:
  #     - app-network


  redis:
    image: redis:trixie
    container_name: ajd_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./db/redis_data:/data
    networks:
      - app-network



  elasticsearch:
    image: elasticsearch:9.3.6
    container_name: ajd_elastic
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m 
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - xpack.security.enabled=false
    ports:
      - "${ELASTIC_PORT}:9200"
    volumes:
      - ./db/elastic_data:/usr/share/elasticsearch/data
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: ajd_minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ./db/minio_data:/data
    networks:
      - app-network

volumes:
 postgres_data:
#  mongo_data:
 redis_data:
 elastic_data:



networks:
  app-network:
    driver: bridge